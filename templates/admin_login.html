{% extends "base.html" %}
{% block title %}Admin Login | AutoCare{% endblock %}
{% block content %}
<section class="admin-auth">
  <h1>Admin Login</h1>
  <form class="form-grid" method="POST" action="{{ url_for('admin_login') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Username
      <input type="text" name="username" required>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button class="btn btn-primary" type="submit">Login</button>
  </form>
  {% if debug %}
  <p class="subtext">Demo credentials: <strong>admin</strong> / <strong>admin123</strong></p>
  {% endif %}
</section>
{% endblock %}
