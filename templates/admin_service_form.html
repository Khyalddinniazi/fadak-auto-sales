{% extends "base.html" %}
{% block title %}{% if service and service['service_id'] %}Edit Service{% else %}Add Service{% endif %} | {{ site.name }}{% endblock %}
{% block content %}
<section>
  <h1>{% if service and service['service_id'] %}Edit Service{% else %}Add Service{% endif %}</h1>
  <form class="form-grid" method="POST" action="{{ form_action }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label class="full-width">Service Name*
      <input type="text" name="service_name" value="{{ service['service_name'] if service else '' }}" required>
    </label>
    <label>Price (USD)*
      <input type="number" step="0.01" min="0" name="estimated_price" value="{{ service['estimated_price'] if service else '' }}" required>
    </label>
    <label class="full-width">Description*
      <textarea name="description" rows="4" required>{{ service['description'] if service else '' }}</textarea>
    </label>

    <button class="btn btn-primary" type="submit">Save Service</button>
    <a class="btn btn-outline" href="{{ url_for('admin_services') }}">Cancel</a>
  </form>
</section>
{% endblock %}
